name: bidms
channels:
  - defaults
  - conda-forge
  - bioconda
dependencies:
  - numpy
  - snakemake=9.14.3
  - python=3.13
  - scikit-learn
  - nbconvert
  - ipython_genutils
  - jupyter
  - networkx
  - tqdm
  - pip:
      - absl-py
      - alabaster
      - contourpy
      - cycler
      - docutils
      - fonttools
      - imagesize
      - immutabledict
      - jinja2
      - kiwisolver
      - matplotlib
      - netrd
      - numpydoc
      - ortools
      - pctk
      - pillow
      - protobuf
      - snowballstemmer
      - sphinx
      - sphinx-rtd-theme
      - sphinxcontrib-applehelp
      - sphinxcontrib-devhelp
      - sphinxcontrib-htmlhelp
      - sphinxcontrib-jquery
      - sphinxcontrib-jsmath
      - sphinxcontrib-qthelp
      - sphinxcontrib-serializinghtml
prefix: /home/marco/miniconda3/envs/bidms
